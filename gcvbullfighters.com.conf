/etc/apache2/sites-available/gcvbullfighters.com.conf

<VirtualHost *:80>
        ServerName gcvbullfighters.com
        ServerAlias www.gcvbullfighters.com
        Redirect permanent / https://gcvbullfighters.com/
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>

        ServerName gcvbullfighters.com
	ServerAlias www.gcvbullfighters.com
        ServerAdmin info@gcvbullfighters.com
        DocumentRoot /var/www/gcvbullfighters.com/wordpress/

        <Directory /var/www/gcvbullfighters.com/wordpress>
           Options FollowSymLinks
           AllowOverride Limit Options FileInfo
           DirectoryIndex index.php
           Require all granted
        </Directory>
        <Directory /var/www/gcvbullfighters.com/wordpress/wp-content>
           Options FollowSymLinks
           Require all granted
        </Directory>

        ErrorLog /var/www/gcvbullfighters.com/logs/error.log
        CustomLog /var/www/gcvbullfighters.com/logs/access.log combined

        SSLCertificateFile /etc/letsencrypt/live/gcvbullfighters.com/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/gcvbullfighters.com/privkey.pem
        Include /etc/letsencrypt/options-ssl-apache.conf

</VirtualHost>
</IfModule>
